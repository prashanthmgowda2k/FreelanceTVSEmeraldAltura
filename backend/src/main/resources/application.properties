# ── Server ──────────────────────────────────────────────────────
server.port=8080

# ── MySQL ────────────────────────────────────────────────────────
# Use environment variables for database credentials in CI/CD and local machine setup.
# Example values are provided in application.example.properties.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── App config ───────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:4173

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.nikoo=DEBUG
