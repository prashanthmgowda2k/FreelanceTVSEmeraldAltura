# Local database example configuration for TVS Emerald Altura
# Copy this file to src/main/resources/application.properties, then update values as needed.

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/TVSEmeraldAltura
spring.datasource.username=root
spring.datasource.password=replace_with_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origins=http://localhost:5173,http://localhost:4173

logging.level.com.nikoo=DEBUG
